<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tính toán hàm Excel từ file TXT</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- CDN Formula.js -->
  <script src="https://cdn.jsdelivr.net/npm/jstat@1.9.2/dist/jstat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/formulajs/formulajs@2.9.3/dist/formula.min.js"></script>
</head>
<body>
  <h1>Upload file .txt chứa dữ liệu hoặc công thức Excel</h1>
  
  <input type="file" id="fileInput" accept=".txt">
  <button onclick="processFile()">Tính toán</button>

  <div id="content"></div>
  <div id="result"></div>

  <script src="js/script.js"></script>
</body>
</html>
