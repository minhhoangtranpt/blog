<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bắn Trứng - Game Vui Nhộn</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(#87CEEB, #E0F7FA);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #333;
        }
        .game-container {
            text-align: center;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            width: 800px;
        }
        header {
            background: #FF5722;
            color: white;
            padding: 15px;
            font-size: 2rem;
            font-weight: bold;
        }
        canvas {
            background: #87CEEB;
            display: block;
            margin: 0 auto;
        }
        .info {
            display: flex;
            justify-content: space-around;
            padding: 12px;
            background: #FF9800;
            color: white;
            font-size: 1.2rem;
        }
        .controls {
            padding: 15px;
            background: #f5f5f5;
            font-size: 1rem;
        }
        button {
            margin-top: 10px;
            padding: 12px 30px;
            font-size: 1.1rem;
            background: #FF5722;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        button:hover { background: #E64A19; }
    </style>
</head>
<body>

<div class="game-container">
    <header>🥚 BẮN TRỨNG 🐔</header>
    
    <div class="info">
        <div>Điểm: <span id="score">0</span></div>
        <div>Mạng: <span id="lives">3</span></div>
        <div>Cấp độ: <span id="level">1</span></div>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <div class="controls">
        <strong>Hướng dẫn:</strong> ← → hoặc A D để di chuyển • Space hoặc Click để bắn trứng<br>
        <button onclick="startGame()">Chơi Lại</button>
    </div>
</div>

<script>
// ==================== GAME VARIABLES ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let score = 0;
let lives = 3;
let level = 1;
let gameRunning = false;

let player = {
    x: 400,
    y: 420,
    width: 60,
    height: 50,
    speed: 8
};

let bullets = [];     // Trứng bắn lên
let eggs = [];        // Trứng rơi xuống (kẻ địch)
let particles = [];   // Hiệu ứng nổ

let keys = {};

// ==================== DRAW FUNCTIONS ====================
function drawPlayer() {
    ctx.fillStyle = '#FF9800';
    ctx.fillRect(player.x, player.y, player.width, player.height); // thân gà
    
    // Đầu gà
    ctx.fillStyle = '#FF5722';
    ctx.beginPath();
    ctx.arc(player.x + 30, player.y - 10, 18, 0, Math.PI * 2);
    ctx.fill();
    
    // Mỏ
    ctx.fillStyle = '#FFEB3B';
    ctx.beginPath();
    ctx.moveTo(player.x + 40, player.y - 10);
    ctx.lineTo(player.x + 55, player.y - 5);
    ctx.lineTo(player.x + 40, player.y);
    ctx.fill();
    
    ctx.fillStyle = '#000';
    ctx.font = '20px Arial';
    ctx.fillText('🐔', player.x + 18, player.y + 35);
}

function drawBullet(b) {
    ctx.fillStyle = '#FFEB3B';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = '12px Arial';
    ctx.fillText('🥚', b.x - 8, b.y + 5);
}

function drawEgg(e) {
    ctx.fillStyle = '#FFEB3B';
    ctx.beginPath();
    ctx.ellipse(e.x, e.y, 12, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFF176';
    ctx.beginPath();
    ctx.arc(e.x - 5, e.y - 5, 5, 0, Math.PI * 2);
    ctx.fill();
}

function drawParticle(p) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.alpha;
    ctx.fillRect(p.x, p.y, 8, 8);
    ctx.globalAlpha = 1;
}

// ==================== GAME LOGIC ====================
function update() {
    if (!gameRunning) return;

    // Di chuyển người chơi
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;

    // Giới hạn màn hình
    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

    // Cập nhật đạn (trứng bắn)
    for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= 12;
        if (bullets[i].y < 0) bullets.splice(i, 1);
    }

    // Tạo trứng rơi ngẫu nhiên
    if (Math.random() < 0.03 + level * 0.01) {
        eggs.push({
            x: Math.random() * (canvas.width - 40) + 20,
            y: 30,
            speed: 3 + level * 0.5
        });
    }

    // Cập nhật trứng rơi
    for (let i = eggs.length - 1; i >= 0; i--) {
        eggs[i].y += eggs[i].speed;

        // Va chạm với người chơi (mất mạng)
        if (
            eggs[i].x > player.x && 
            eggs[i].x < player.x + player.width &&
            eggs[i].y + 20 > player.y
        ) {
            lives--;
            createExplosion(eggs[i].x, eggs[i].y, '#FF5722');
            eggs.splice(i, 1);
            if (lives <= 0) endGame();
            continue;
        }

        // Trứng rơi khỏi màn hình
        if (eggs[i].y > canvas.height) eggs.splice(i, 1);
    }

    // Va chạm đạn với trứng rơi
    for (let i = bullets.length - 1; i >= 0; i--) {
        for (let j = eggs.length - 1; j >= 0; j--) {
            let dx = bullets[i].x - eggs[j].x;
            let dy = bullets[i].y - eggs[j].y;
            if (Math.sqrt(dx*dx + dy*dy) < 25) {
                createExplosion(eggs[j].x, eggs[j].y, '#FFEB3B');
                bullets.splice(i, 1);
                eggs.splice(j, 1);
                score += 10;
                break;
            }
        }
    }

    // Tăng cấp độ
    if (score > level * 100) level++;

    // Cập nhật particles
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].x += particles[i].vx;
        particles[i].y += particles[i].vy;
        particles[i].alpha -= 0.02;
        if (particles[i].alpha <= 0) particles.splice(i, 1);
    }
}

function createExplosion(x, y, color) {
    for (let i = 0; i < 15; i++) {
        particles.push({
            x: x,
            y: y,
            vx: Math.random() * 8 - 4,
            vy: Math.random() * 8 - 4,
            alpha: 1,
            color: color
        });
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Vẽ nền đơn giản
    ctx.fillStyle = '#81D4FA';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawPlayer();

    bullets.forEach(b => drawBullet(b));
    eggs.forEach(e => drawEgg(e));
    particles.forEach(p => drawParticle(p));

    // Hiển thị thông tin trên canvas
    ctx.fillStyle = '#000';
    ctx.font = 'bold 24px Arial';
    ctx.fillText(`Điểm: ${score}`, 20, 40);
}

// ==================== GAME LOOP ====================
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// ==================== CONTROLS ====================
document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if ((e.key === ' ' || e.key === 'Spacebar') && gameRunning) {
        e.preventDefault();
        bullets.push({
            x: player.x + player.width / 2,
            y: player.y - 10
        });
    }
});

document.addEventListener('keyup', e => {
    keys[e.key] = false;
});

canvas.addEventListener('click', () => {
    if (gameRunning) {
        bullets.push({
            x: player.x + player.width / 2,
            y: player.y - 10
        });
    }
});

// ==================== START & END ====================
function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    bullets = [];
    eggs = [];
    particles = [];
    player.x = 370;
    gameRunning = true;
    
    document.getElementById('score').textContent = score;
    document.getElementById('lives').textContent = lives;
    document.getElementById('level').textContent = level;
}

function endGame() {
    gameRunning = false;
    alert(`🎮 Game Over!\nĐiểm số của bạn: ${score}\nCấp độ đạt được: ${level}`);
}

// Khởi động game
startGame();
gameLoop();
</script>

</body>
</html>
