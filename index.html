<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TwinPlates Analyzer - UMP</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jstat@1.9.2/dist/jstat.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>TwinPlates Analyzer</h1>
        <p class="description">Công cụ phân tích mốc thời gian chuyển động dành cho nghiên cứu Phục hồi chức năng</p>
    </header>

    <div class="upload-card">
        <div class="config-group">
            <div class="input-item">
                <label>Khử nhiễu (ms)</label>
                <input type="number" id="windowMs" value="20" min="1" max="500">
            </div>
            <div class="input-item">
                <label>Chọn tệp .txt</label>
                <input type="file" id="fileInput" accept=".txt">
            </div>
        </div>
        <button onclick="processFile()">Tính toán & Vẽ biểu đồ</button>
    </div>

    <div id="result" class="result-grid">
        </div>

    <div class="chart-container card animate" style="display: none;" id="chartWrapper">
        <h3>Biểu đồ lực Fz Total</h3>
        <canvas id="fzChart"></canvas>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
