<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phân tích dữ liệu TwinPlates</title>
  <link rel="stylesheet" href="css/style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/jstat@1.9.2/dist/jstat.min.js"></script>
  </head>
<body>
  <div class="container">
    <h1>Phân tích chỉ số lực (T0 - T5)</h1>
    
    <div class="upload-section">
      <p>Chọn file .txt từ thiết bị TwinPlates để bắt đầu:</p>
      <input type="file" id="fileInput" accept=".txt">
      <button id="calcBtn" onclick="processFile()">Tính toán kết quả</button>
    </div>

    <div id="subjectInfo"></div>

    <div id="result"></div>
    
    <canvas id="forceChart"></canvas>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
