<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân tích dữ liệu TwinPlates</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jstat@1.9.2/dist/jstat.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .description {
            color: var(--text-sub);
        }

        /* Thẻ Upload & Cấu hình */
        .config-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 2px dashed #cbd5e1;
            margin-bottom: 30px;
        }

        .config-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .input-item label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 5px;
            text-align: left;
        }

        input[type="number"] {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            width: 80px;
            outline: none;
        }

        input[type="file"] {
            padding: 8px;
            font-size: 0.9rem;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* Khu vực hiển thị kết quả */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-full {
            grid-column: 1 / -1;
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-sub);
        }

        .value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .unit {
            font-size: 1rem;
            color: var(--text-sub);
            font-weight: 400;
            margin-left: 5px;
        }

        .info-footer {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--text-sub);
            border-top: 1px solid #f1f5f9;
            padding-top: 10px;
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TwinPlates Analyzer</h1>
        <p class="description">Phân tích mốc thời gian chuyển động (T0 - T1)</p>
    </header>

    <div class="config-card">
        <div class="config-group">
            <div class="input-item">
                <label>Khử nhiễu (ms)</label>
                <input type="number" id="windowMs" value="20" min="1" max="500">
            </div>
            <div class="input-item">
                <label>Chọn file dữ liệu (.txt)</label>
                <input type="file" id="fileInput" accept=".txt">
            </div>
        </div>
        <button onclick="processFile()">Tính toán ngay</button>
    </div>

    <div id="result" class="result-grid">
        </div>
</div>

<script>
    function processFile() {
        const fileInput = document.getElementById('fileInput');
        const resultDiv = document.getElementById('result');
        const windowMs = parseInt(document.getElementById('windowMs').value) || 20;
        
        if (!fileInput.files.length) {
            alert("Vui lòng chọn file .txt trước khi tính toán!");
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const text = e.target.result;
            const lines = text.split(/\r?\n/);
            
            // 1. Tìm vị trí bắt đầu dữ liệu
            let dataStartIndex = -1;
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes("Time (s)")) {
                    // Kiểm tra nếu có hàng tiêu đề phụ (như TOTAL, A, B)
                    dataStartIndex = (lines[i+1] && lines[i+1].includes("TOTAL")) ? i + 2 : i + 1;
                    break;
                }
            }

            if (dataStartIndex === -1) {
                resultDiv.innerHTML = "<p style='color:red;'>Lỗi: Không tìm thấy định dạng cột dữ liệu chuẩn.</p>";
                return;
            }

            // 2. Trích xuất dữ liệu
            let timeData = [];
            let fzData = [];

            for (let i = dataStartIndex; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const cols = line.split('\t');
                const t = parseFloat(cols[0]);
                const fz = parseFloat(cols[1]); // Cột Fz của TOTAL

                if (!isNaN(t) && !isNaN(fz)) {
                    timeData.push(t);
                    fzData.push(fz);
                }
            }

            if (timeData.length < 2) {
                resultDiv.innerHTML = "<p style='color:red;'>Lỗi: File không có dữ liệu số hợp lệ.</p>";
                return;
            }

            try {
                // --- A. Tính Baseline (5 giây đầu) ---
                const fz5s = fzData.filter((_, idx) => timeData[idx] <= 5.0);
                const meanFz5s = jStat.mean(fz5s);
                const thresholdT0 = 0.025 * meanFz5s;

                // --- B. Tìm T1 (Đỉnh lực trong 10 giây đầu) ---
                let maxFz = -Infinity;
                let T1_idx = 0;
                for (let i = 0; i < timeData.length; i++) {
                    if (timeData[i] > 10.0) break;
                    if (fzData[i] > maxFz) {
                        maxFz = fzData[i];
                        T1_idx = i;
                    }
                }
                const T1 = timeData[T1_idx];

                // --- C. Tìm T0 (Trước T1, sử dụng cửa sổ khử nhiễu) ---
                const sampleRate = 1 / (timeData[1] - timeData[0]);
                const windowSize = Math.ceil((windowMs / 1000) * sampleRate);
                
                let T0_val = "Không tìm thấy";
                for (let i = 0; i <= T1_idx - windowSize; i++) {
                    let isStable = true;
                    for (let j = 0; j < windowSize; j++) {
                        if (fzData[i + j] >= thresholdT0) {
                            isStable = false;
                            break;
                        }
                    }
                    if (isStable) {
                        T0_val = timeData[i].toFixed(4) + " s";
                        break;
                    }
                }

                // --- D. Hiển thị ---
                resultDiv.innerHTML = `
                    <div class="card card-full animate">
                        <h3>Lực nền (Baseline 0-5s)</h3>
                        <div class="value">${meanFz5s.toFixed(2)}<span class="unit">Newton (N)</span></div>
                        <div class="info-footer">Ngưỡng kích hoạt T0 (< 2.5%): ${thresholdT0.toFixed(2)} N</div>
                    </div>
                    
                    <div class="card animate" style="border-top: 4px solid var(--danger);">
                        <h3>Mốc T0 (Khởi phát)</h3>
                        <div class="value" style="color: var(--danger);">${T0_val}</div>
                        <div class="info-footer">Duy trì ổn định trong ít nhất ${windowMs}ms</div>
                    </div>

                    <div class="card animate" style="border-top: 4px solid var(--success);">
                        <h3>Mốc T1 (Cực đại)</h3>
                        <div class="value" style="color: var(--success);">${T1.toFixed(4)}<span class="unit">s</span></div>
                        <div class="info-footer">Giá trị Fz max đạt: ${maxFz.toFixed(2)} N</div>
                    </div>
                `;

            } catch (err) {
                console.error(err);
                resultDiv.innerHTML = "<p style='color:red;'>Lỗi trong quá trình tính toán thống kê.</p>";
            }
        };

        reader.readAsText(file);
    }
</script>

</body>
</html>
